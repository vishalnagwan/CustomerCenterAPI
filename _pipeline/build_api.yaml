name: $(Date:yyyy-MM-dd)$(Rev:.r)

resources:
  repositories:
    - repository: tools
      type: git
      name: Conversense/Tools

jobs:
- job: Build
  pool:
    name: Default
  steps:
  - task: DotNetCoreCLI@2
    displayName: dotnet publish
    inputs:
      command: publish
      publishWebProjects: false
      projects: 'Uniban.DemoiGlassData.API/Uniban.DemoiGlassData.API.csproj'
      arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
      feedsToUse: config
      nugetConfigPath: 'Nuget.config' 
      zipAfterPublish: True
  - template: Pipelines/publish.yml@tools

trigger:
  branches:
    include: 
    - master
    - develop
    - release/*
    - hotfix/*